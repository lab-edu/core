spring:
  datasource:
    url: jdbc:h2:mem:labedu;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

lab:
  security:
    jwt:
      secret: lab-edu-test-secret-lab-edu-test-secret-lab-edu-test-secret
      expiration-minutes: 30
  storage:
    base-path: ./target/test-uploads